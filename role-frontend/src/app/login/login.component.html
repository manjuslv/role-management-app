<div style="max-width:400px; margin:100px auto; font-family:sans-serif">
  <div style="background:#f5f5f5; padding:30px; border-radius:8px">
    
    <h2 style="text-align:center; margin-bottom:20px">Login</h2>

    <!-- Error message -->
    <div *ngIf="errorMessage"
         style="background:#f8d7da; color:#721c24; padding:10px; border-radius:4px; margin-bottom:15px">
      {{ errorMessage }}
    </div>

    <!-- Username -->
    <input
      [(ngModel)]="username"
      placeholder="Username"
      style="display:block; width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:4px; box-sizing:border-box"/>

    <!-- Password -->
    <input
      [(ngModel)]="password"
      type="password"
      placeholder="Password"
      style="display:block; width:100%; padding:10px; margin-bottom:15px; border:1px solid #ddd; border-radius:4px; box-sizing:border-box"/>

    <!-- Login button -->
    <button
      (click)="login()"
      style="width:100%; padding:10px; background:#007bff; color:white; border:none; border-radius:4px; cursor:pointer; font-size:16px">
      Login
    </button>

    <!-- Register link -->
    <p style="text-align:center; margin-top:15px">
      Don't have an account?
      <a href="/register" style="color:#007bff">Register</a>
    </p>

  </div>
</div>
